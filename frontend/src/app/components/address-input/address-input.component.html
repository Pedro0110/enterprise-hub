<div [formGroup]="form" class="card bg-light">
  <div class="card-body">
    <h5 class="card-title">Endereço</h5>

    <div class="row">
      <div class="col-md-3 mb-3">
        <label for="addressZipCode" class="form-label">CEP</label>
        <div class="input-group">
          <input
            id="addressZipCode"
            type="text"
            inputmode="numeric"
            autocomplete="postal-code"
            class="form-control"
            [class.is-invalid]="form.get('addressZipCode')?.invalid && form.get('addressZipCode')?.touched"
            [attr.aria-invalid]="form.get('addressZipCode')?.invalid && form.get('addressZipCode')?.touched"
            aria-describedby="addressZipCodeError"
            formControlName="addressZipCode"
            appCepMask
            (blur)="fetchAddressByZipCode()"
            placeholder="00000-000"
            >
          <button
            class="btn btn-outline-primary"
            type="button"
            (click)="fetchAddressByZipCode()"
            [disabled]="loadingCep || (form.get('addressZipCode')?.invalid ?? false)"
            >
            @if (!loadingCep) {
              <span>Buscar</span>
            }
            @if (loadingCep) {
              <span>
                <span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span>
                <span class="visually-hidden">Buscando...</span>
              </span>
            }
          </button>
        </div>
        @if (form.get('addressZipCode')?.touched && form.get('addressZipCode')?.errors; as errors) {
          <div
            id="addressZipCodeError"
            class="invalid-feedback d-block"
            role="alert"
            >
            @if (errors['notFound']) {
              <span>CEP não encontrado</span>
            } @else {
              CEP obrigatório (8 dígitos)
            }
          </div>
        }
      </div>

      <div class="col-md-6 mb-3">
        <label for="addressStreet" class="form-label">Logradouro</label>
        <input
          id="addressStreet"
          type="text"
          autocomplete="address-line1"
          class="form-control"
          formControlName="addressStreet"
          placeholder="Rua, Avenida, etc."
          >
      </div>

      <div class="col-md-3 mb-3">
        <label for="addressNumber" class="form-label">Número</label>
        <input
          id="addressNumber"
          type="text"
          inputmode="numeric"
          autocomplete="address-line2"
          class="form-control"
          formControlName="addressNumber"
          >
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="addressNeighborhood" class="form-label">Bairro</label>
        <input
          id="addressNeighborhood"
          type="text"
          autocomplete="address-level3"
          class="form-control"
          formControlName="addressNeighborhood"
          >
      </div>

      <div class="col-md-4 mb-3">
        <label for="addressCity" class="form-label">Cidade</label>
        <input
          id="addressCity"
          type="text"
          autocomplete="address-level2"
          class="form-control"
          formControlName="addressCity"
          >
      </div>

      <div class="col-md-4 mb-3">
        <label for="addressState" class="form-label">UF</label>
        <select
          id="addressState"
          autocomplete="address-level1"
          class="form-select"
          formControlName="addressState"
          [compareWith]="compareState"
          >
          <option value="">Selecione...</option>
          @for (state of brazilianStates; track state) {
            <option [value]="state.code">
              {{ state.code }} - {{ state.name }}
            </option>
          }
        </select>
      </div>
    </div>
  </div>
</div>
