<div [formGroup]="form" class="card bg-light">
  <div class="card-body">
    <h5 class="card-title">Endereço</h5>

    <div class="row">
      <div class="col-md-3 mb-3">
        <label for="addressZipCode" class="form-label">CEP</label>
        <div class="input-group">
          <input
            id="addressZipCode"
            type="text"
            class="form-control"
            [class.is-invalid]="form.get('addressZipCode')?.invalid && form.get('addressZipCode')?.touched"
            formControlName="addressZipCode"
            appCepMask
            (blur)="buscarCep()"
            placeholder="00000-000"
          >
          <button
            class="btn btn-outline-primary"
            type="button"
            (click)="buscarCep()"
          >
            Buscar
          </button>
        </div>
        <div class="invalid-feedback d-block" *ngIf="form.get('addressZipCode')?.invalid && form.get('addressZipCode')?.touched">
          CEP obrigatório (8 dígitos)
        </div>
      </div>

      <div class="col-md-6 mb-3">
        <label for="addressStreet" class="form-label">Logradouro</label>
        <input
          id="addressStreet"
          type="text"
          class="form-control"
          formControlName="addressStreet"
          placeholder="Rua, Avenida, etc."
        >
      </div>

      <div class="col-md-3 mb-3">
        <label for="addressNumber" class="form-label">Número</label>
        <input
          id="addressNumber"
          type="text"
          class="form-control"
          formControlName="addressNumber"
        >
      </div>
    </div>

    <div class="row">
      <div class="col-md-4 mb-3">
        <label for="addressNeighborhood" class="form-label">Bairro</label>
        <input
          id="addressNeighborhood"
          type="text"
          class="form-control"
          formControlName="addressNeighborhood"
        >
      </div>

      <div class="col-md-4 mb-3">
        <label for="addressCity" class="form-label">Cidade</label>
        <input
          id="addressCity"
          type="text"
          class="form-control"
          formControlName="addressCity"
        >
      </div>

      <div class="col-md-4 mb-3">
        <label for="addressState" class="form-label">UF</label>
        <input
          id="addressState"
          type="text"
          class="form-control"
          formControlName="addressState"
          maxlength="2"
        >
      </div>
    </div>
  </div>
</div>
