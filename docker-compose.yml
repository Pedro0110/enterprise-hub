services:
  db:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=enterprisehub'
      - 'POSTGRES_PASSWORD=postgres'
      - 'POSTGRES_USER=postgres'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d enterprisehub']
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-net

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: enterprise-hub
    ports:
      - '4200:4200' # frontend com hot reload
      # - '8080:8080' # backend (opcional, para debug)
    volumes:
      - ./frontend/src:/app/frontend/src
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/enterprisehub
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'true'
      SPRING_DOCKER_COMPOSE_ENABLED: false
    networks:
      - app-net
    depends_on:
      db:
        condition: service_healthy
volumes:
  pgdata:

networks:
  app-net:
    driver: bridge
